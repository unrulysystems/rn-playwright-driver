name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup nub
        uses: nubjs/setup-nub@v0

      - name: Install dependencies
        run: nub ci

      - name: Run typecheck
        run: nub run typecheck

      - name: Run lint
        run: nub run lint

      - name: Check formatting
        run: nub run format:check

      - name: Run tests
        run: nub run test

      - name: Check code duplication
        run: nub run cpd

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup nub
        uses: nubjs/setup-nub@v0

      - name: Install dependencies
        run: nub ci

      - name: Build packages
        run: nub run build

  # E2E tests require a real device/simulator and are run locally or on self-hosted runners.
  # Official example confidence gates:
  # - cd examples/basic-app && nub run test:e2e:android  # Android instrumentation companion
  # - cd examples/basic-app && nub run test:e2e:ios      # iOS XCTest companion
  # See docs/CI.md for iOS Simulator and Android Emulator setup.
