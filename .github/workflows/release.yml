name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      # Auth for the PUBLIC npm registry. Requires an NPM_TOKEN repo secret: a
      # granular automation token with publish scope (2FA-bypass for CI). Until
      # that secret is set this step writes an empty token and automated publish
      # is inert — the first public publish is run manually (`bun publish`) by a
      # maintainer with npm 2FA. Scoped packages publish public via each
      # package's publishConfig.access = "public".
      - name: Configure npm for public registry
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc

      # Run the test suite before publishing — the release-manifest invariant
      # (no workspace: specs shipped; published harness/bin only imports published
      # paths) lives in vitest. A broken @unrulysystems/rn-playwright-driver@0.4.0
      # already shipped once; this gate must run on the publish path, not only CI.
      - name: Run tests
        run: bun run test

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bunx changeset publish
          version: bunx changeset version
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Releases
        if: steps.changesets.outputs.published == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const publishedPackages = ${{ steps.changesets.outputs.publishedPackages }};
            const packageDirectories = {
              '@unrulysystems/rn-playwright-driver': 'driver',
              '@unrulysystems/rn-playwright-driver-runner': 'runner',
              '@unrulysystems/rn-playwright-driver-xctest-companion': 'xctest-companion',
              '@unrulysystems/rn-playwright-driver-instrumentation-companion': 'instrumentation-companion',
              '@unrulysystems/rn-driver-touch': 'rn-driver-touch',
              '@unrulysystems/rn-driver-view-tree': 'view-tree',
              '@unrulysystems/rn-driver-screenshot': 'screenshot',
              '@unrulysystems/rn-driver-lifecycle': 'lifecycle',
              '@unrulysystems/rn-driver-shared-types': 'shared-types',
            };
            for (const pkg of publishedPackages) {
              const tagName = `${pkg.name}@${pkg.version}`;
              const packageDirectory = packageDirectories[pkg.name] ?? pkg.name.replace(/^@[^/]+\//, '');
              try {
                await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tagName,
                  name: tagName,
                  body: `## ${pkg.name}@${pkg.version}\n\nSee [CHANGELOG](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/packages/${packageDirectory}/CHANGELOG.md) for details.`,
                  draft: false,
                  prerelease: false,
                });
                console.log(`Created release for ${tagName}`);
              } catch (error) {
                console.log(`Release for ${tagName} may already exist: ${error.message}`);
              }
            }
