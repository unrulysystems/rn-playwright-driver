name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: |
          bun run --filter '@unrulysystems/rn-playwright-driver' build

      # Auth for the unrulysystems-org GitHub Packages npm registry. Uses the
      # built-in GITHUB_TOKEN (packages: write) — no external NPM_TOKEN needed,
      # since the @unrulysystems scope is owned by the same org as this repo.
      - name: Configure npm for GitHub Packages
        run: |
          echo "@unrulysystems:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc

      # Run the test suite before publishing — the release-manifest invariant
      # (no workspace: specs shipped; published harness/bin only imports published
      # paths) lives in vitest. A broken @unrulysystems/rn-playwright-driver@0.4.0
      # already shipped once; this gate must run on the publish path, not only CI.
      - name: Run tests
        run: bun run test

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bunx changeset publish
          version: bunx changeset version
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Releases
        if: steps.changesets.outputs.published == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const publishedPackages = ${{ steps.changesets.outputs.publishedPackages }};
            for (const pkg of publishedPackages) {
              const tagName = `${pkg.name}@${pkg.version}`;
              try {
                await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tagName,
                  name: tagName,
                  body: `## ${pkg.name}@${pkg.version}\n\nSee [CHANGELOG](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/packages/${pkg.name.replace(/^@[^/]+\//, '').replace('rn-playwright-', '').replace('rn-driver-', '')}/CHANGELOG.md) for details.`,
                  draft: false,
                  prerelease: false,
                });
                console.log(`Created release for ${tagName}`);
              } catch (error) {
                console.log(`Release for ${tagName} may already exist: ${error.message}`);
              }
            }
