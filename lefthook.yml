# Lefthook git hooks configuration
# https://github.com/evilmartians/lefthook
# oxc (oxlint/oxfmt) on staged files; typecheck/knip/cpd/test via root scripts.

pre-commit:
  commands:
    typecheck:
      glob: '*.{ts,tsx}'
      run: bun run typecheck
    lint:
      glob: '*.{js,ts,cjs,mjs,jsx,tsx}'
      # Local bin, not `npx` — npx can fetch+execute registry code outside bun.lock
      # if node_modules is missing, during a commit that inherits the repo shell env.
      run: node_modules/.bin/oxlint --fix {staged_files}
      stage_fixed: true
    format:
      glob: '*.{js,ts,cjs,mjs,jsx,tsx,json,jsonc}'
      run: node_modules/.bin/oxfmt --write {staged_files}
      stage_fixed: true
    cpd:
      glob: '*.{ts,tsx}'
      run: bun run cpd

pre-push:
  commands:
    typecheck:
      glob: '*.{ts,tsx}'
      run: bun run typecheck
    lint:
      glob: '*.{js,ts,cjs,mjs,jsx,tsx}'
      run: node_modules/.bin/oxlint {push_files}
    format:
      glob: '*.{js,ts,cjs,mjs,jsx,tsx,json,jsonc}'
      run: node_modules/.bin/oxfmt --check {push_files}
    knip:
      glob: '*.{ts,tsx,json}'
      run: bun run knip
    cpd:
      glob: '*.{ts,tsx}'
      run: bun run cpd
    test:
      run: bun run test
