# Lefthook git hooks configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    typecheck:
      run: nub run typecheck
    lint:
      run: nub run lint
    cpd:
      run: nub run cpd

pre-push:
  parallel: true
  commands:
    typecheck:
      run: nub run typecheck
    knip:
      run: nub run knip
    lint:
      run: nub run lint
